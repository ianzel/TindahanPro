<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TindahanPro</title>

  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div id="login-screen"></div>

  <div id="main-app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">TindahanPro</div>

      <div class="nav">
        <button id="nav-dashboard" class="nav-btn">Dashboard</button>
        <button id="nav-products" class="nav-btn">Products</button>
        <button id="nav-sales" class="nav-btn">Sales</button>
        <button id="nav-reports" class="nav-btn">Reports</button>
        <button id="nav-suppliers" class="nav-btn">Suppliers</button>
        <button id="nav-credit" class="nav-btn">Credit</button>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- HEADER -->
      <header class="header">
        <div class="header-right">

          <button id="dark-toggle" class="icon-btn">🌙</button>

          <!-- AVATAR -->
          <div id="profile-avatar" class="avatar"></div>

          <!-- PROFILE MENU -->
          <div id="profile-menu" class="profile-menu hidden">
            <div class="profile-info">
              <strong id="user-name"></strong>
              <small id="user-email"></small>
            </div>

            <button id="open-profile-edit">Edit Profile</button>
            <button id="logout-btn">Logout</button>
          </div>

        </div>
      </header>

      <!-- CONTENT -->
      <main id="app"></main>

    </div>
  </div>

  <!-- MODAL -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-box">
      <h3>Edit Profile</h3>

      <input id="edit-username" placeholder="Enter new username" />

      <div class="modal-actions">
        <button id="cancel-profile" class="btn-cancel">Cancel</button>
        <button id="save-profile" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="./dist/app.js"></script>
</body>
</html>
