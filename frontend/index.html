<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TindahanPro</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen"></div>

<!-- APP -->
<div id="main-app" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>TindahanPro</h2>

    <div class="nav">
      <button class="nav-btn" id="nav-dashboard">Dashboard</button>
      <button class="nav-btn" id="nav-products">Products</button>
      <button class="nav-btn" id="nav-sales">Sales</button>
      <button class="nav-btn" id="nav-reports">Reports</button>
      <button class="nav-btn" id="nav-suppliers">Suppliers</button>
      <button class="nav-btn" id="nav-credit">Credit</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <div class="header-right">

        <!-- DARK MODE -->
        <button id="dark-toggle" class="icon-btn">🌙</button>

        <!-- PROFILE -->
        <div class="profile-wrapper">

          <img id="profile-avatar"
               src="https://ui-avatars.com/api/?name=User"
               class="profile-avatar"/>

          <!-- PROFILE MENU -->
          <div id="profile-menu" class="profile-menu">

            <div class="profile-info">
              <p id="user-name">User</p>
              <small id="user-email">user@email.com</small>
            </div>

            <button id="open-profile-edit">Edit Profile</button>
            <button id="logout-btn">Logout</button>

          </div>

        </div>
      </div>
    </div>

    <!-- MODAL -->
    <div id="profile-modal" class="modal">

      <div class="modal-content">

        <h3>Edit Profile</h3>

        <label>Username</label>
        <input id="edit-username" type="text"/>

        <label>New Password</label>
        <input id="edit-password" type="password"/>

        <div class="modal-actions">
          <button id="save-profile" class="btn-save">Save</button>
          <button id="cancel-profile" class="btn-cancel">Cancel</button>
        </div>

      </div>

    </div>

    <main id="app" class="content"></main>

  </div>
</div>

<script type="module" src="dist/app.js"></script>

</body>
</html>
