<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TindahanPro</title>

  <link rel="stylesheet" href="styles.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="login-screen"></div>

<div id="main-app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">TindahanPro</div>

    <div class="nav">
      <button id="nav-dashboard" class="nav-btn">Dashboard</button>
      <button id="nav-products" class="nav-btn">Products</button>
      <button id="nav-sales" class="nav-btn">Sales</button>
      <button id="nav-reports" class="nav-btn">Reports</button>
      <button id="nav-suppliers" class="nav-btn">Suppliers</button>
      <button id="nav-credit" class="nav-btn">Credit</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <header class="header">
      <div class="header-right">

        <button id="dark-toggle" class="icon-btn">🌙</button>

        <div id="profile-avatar" class="avatar">U</div>

        <div id="profile-menu" class="profile-menu hidden">
          <div class="profile-info">
            <strong id="user-name">User</strong><br/>
            <small id="user-email">email</small>
          </div>

          <button id="open-profile-edit">Edit Profile</button>
          <button id="logout-btn">Logout</button>
        </div>

      </div>
    </header>

    <main id="app"></main>

  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profile-modal" class="modal hidden">
  <div class="modal-card">

    <h3>Edit Profile</h3>

    <input id="edit-username" placeholder="Username"/>
    <input id="edit-email" placeholder="Email"/>
    <input id="edit-password" type="password" placeholder="New Password"/>
    <input id="edit-password-confirm" type="password" placeholder="Confirm Password"/>

    <div class="modal-actions">
      <button id="cancel-profile">Cancel</button>
      <button id="save-profile">Save</button>
    </div>

  </div>
</div>

<script type="module" src="./dist/app.js"></script>

</body>
</html>
