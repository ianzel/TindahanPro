<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TindahanPro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="login-screen"></div>

  <div id="main-app" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>TindahanPro</h2>

      <button id="nav-dashboard">Dashboard</button>
      <button id="nav-products">Products</button>
      <button id="nav-sales">Sales</button>
      <button id="nav-reports">Reports</button>
      <button id="nav-suppliers">Suppliers</button>
      <button id="nav-credit">Credit</button>

      <div class="spacer"></div>
    </aside>

    <!-- MAIN -->
    <div class="main">

      <!-- HEADER (ONLY PROFILE ICON NOW) -->
      <div class="header">
        <div></div> <!-- empty left -->

        <div class="header-right">
          <div class="profile-wrapper">
            <button id="profile-btn" class="profile-icon">👤</button>

            <div id="profile-menu" class="profile-menu">
              <p id="user-name">User</p>
              <p id="user-role">Store Owner</p>

              <button id="edit-profile-btn">Edit Profile</button>
              <button id="logout-btn">Logout</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PROFILE MODAL -->
      <div id="profile-modal" class="modal">
        <div class="modal-content">
          <h3>Edit Profile</h3>

          <input id="edit-username" placeholder="Username" />
          <input id="edit-password" type="password" placeholder="New Password" />

          <div class="modal-actions">
            <button id="save-profile" class="btn-save">Save</button>
          </div>
        </div>
      </div>

      <!-- CONTENT -->
      <main id="app" class="content"></main>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
